name: Build Skills Catalog

on:
  # Runs on a schedule — rebuilds catalog every day at midnight
  schedule:
    - cron: '0 0 * * *'
  # Can also be triggered manually
  workflow_dispatch:
  # Runs whenever catalog.json or scripts are updated
  push:
    paths:
      - 'catalog.json'
      - 'scripts/**'

jobs:
  build:
    runs-on: ubuntu-latest
    name: Rebuild catalog.json
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      # Step 1: Check out the registry repo
      - name: Checkout skills-registry
        uses: actions/checkout@v4
        with:
          token: ${{ github.repository_owner }}

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      # The new builder inlines its frontmatter parser, so it only needs PyYAML
      # for metadata.yaml + frontmatter parsing, plus requests for the GitHub API.
      - name: Install dependencies
        run: pip install pyyaml requests

      # Step 4: Run the catalog builder
      # Outputs catalog.json and a human-readable build_report.md (status by repo,
      # itemized validation issues per skill).
      - name: Build catalog
        run: python scripts/catalog_builder.py --output catalog.json --report build_report.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ORG: ${{ github.repository_owner }}

      # Step 5: Commit the updated catalog.json + build report
      - name: Commit updated catalog
        run: |
          git config --global user.name "catalog-bot"
          git config --global user.email "catalog-bot@skills-registry"
          git add catalog.json build_report.md
          git diff --staged --quiet || git commit -m "Auto-update catalog.json + build_report.md"
          git push
