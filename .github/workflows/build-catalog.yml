name: Build Skills Catalog

on:
  # Daily rebuild at midnight UTC — safety net catch-all
  schedule:
    - cron: '0 0 * * *'

  # Manual trigger from the GitHub UI; optionally run in strict mode
  workflow_dispatch:
    inputs:
      strict:
        description: 'Fail the build if any skill is broken (strict mode)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

  # Self-triggered: re-run when the builder script or vocab changes
  push:
    paths:
      - 'scripts/**'
      - 'vocab/**'

  # Webhook trigger: team repos call this via a repository_dispatch event
  # after pushing skills. The event type must be exactly "skills-updated".
  #
  # Team repos fire it with a POST to:
  #   https://api.github.com/repos/<ORG>/skills-registry/dispatches
  # Body:
  #   {"event_type": "skills-updated", "client_payload": {"repo": "<team-repo>", "ref": "<git-ref>"}}
  #
  # See skill-standard-template/.github/workflows/notify-registry.yml for
  # the ready-made workflow that does this automatically on push to skills/**.
  repository_dispatch:
    types: [skills-updated]

permissions:
  contents: write       # checkout (read) + auto-commit (write)

jobs:
  build:
    runs-on: ubuntu-latest
    name: Rebuild catalog.json

    steps:
      # ── Traceability: log what triggered this run ─────────────────────────
      - name: Log trigger source
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "  repo:   ${{ github.event.client_payload.repo }}"
            echo "  ref:    ${{ github.event.client_payload.ref }}"
            echo "  sender: ${{ github.event.client_payload.sender }}"
          fi

      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout skills-registry
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Python ────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests

      # ── Build ─────────────────────────────────────────────────────────────
      # strict mode: exit 1 if any skill is broken. Enabled:
      #   - always on repository_dispatch (team-triggered rebuilds must be clean)
      #   - when workflow_dispatch input is 'true'
      #   - never on schedule/push (those are background safety-net runs)
      - name: Determine strict flag
        id: strict
        run: |
          STRICT="false"
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            STRICT="true"
          elif [ "${{ github.event.inputs.strict }}" = "true" ]; then
            STRICT="true"
          fi
          echo "strict=$STRICT" >> "$GITHUB_OUTPUT"

      - name: Build catalog
        run: |
          STRICT_FLAG=""
          if [ "${{ steps.strict.outputs.strict }}" = "true" ]; then
            STRICT_FLAG="--strict"
          fi
          python scripts/catalog_builder.py \
            --output catalog.json \
            --report build_report.md \
            --changelog catalog_changelog.json \
            $STRICT_FLAG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ORG: ${{ github.repository_owner }}

      # ── Commit ────────────────────────────────────────────────────────────
      - name: Commit updated catalog artifacts
        run: |
          git config --global user.name "catalog-bot"
          git config --global user.email "catalog-bot@skills-registry"
          git add catalog.json build_report.md catalog_changelog.json
          git diff --staged --quiet || git commit -m \
            "chore: rebuild catalog [trigger=${{ github.event_name }}]"
          git push
